<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Authentication App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        h2 { margin-bottom: 20px; color: #333; }
        .btn-google {
            background-color: #ffffff;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .btn-google:hover { background-color: #f9fafb; }
        .profile { display: none; margin-top: 20px; text-align: left; background: #f9fafb; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb;}
        .profile img { border-radius: 50%; width: 50px; height: 50px; }
    </style>
</head>
<body>

    <div class="card" id="auth-box">
        <h2>Welcome Portal</h2>
        <button class="btn-google" id="login-btn">
            <!-- Google Minimalist SVG Icon -->
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7v2.25h2.91c1.71-1.57 2.68-3.88 2.68-6.53z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.22l-2.91-2.25c-.8.54-1.83.87-3.05.87-2.34 0-4.33-1.58-5.03-3.71H.92v2.33C2.4 15.97 5.46 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.69c-.18-.54-.28-1.12-.28-1.69s.1-1.15.28-1.69V4.98H.92A8.99 8.99 0 0 0 0 9c0 1.46.35 2.87.92 4.12l3.05-2.43z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.05C13.46.62 11.42 0 9 0 5.46 0 2.4 2.03.92 4.98l3.05 2.43c.7-2.13 2.69-3.71 5.03-3.71z"/></svg>
            Continue with Google
        </button>
    </div>

    <!-- Load Modern Firebase Libraries -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://gstatic.com";

        // ⚠️ REPLACE strings inside quotes with your actual keys from Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize App
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const authBox = document.getElementById('auth-box');

        loginBtn.addEventListener('click', () => {
            // Launch the secure Google popup box
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    
                    // Rewrite UI to show logged-in user profile
                    authBox.innerHTML = `
                        <h2>Success!</h2>
                        <div class="profile" style="display:block;">
                            <img src="${user.photoURL}" alt="User Avatar">
                            <p><strong>Name:</strong> ${user.displayName}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                        </div>
                    `;
                })
                .catch((error) => {
                    alert("Authentication Error: " + error.message);
                });
        });
    </script>
</body>
</html>
